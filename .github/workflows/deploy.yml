
name: Deploy CDK Stack

on:
  schedule:
    # By scheduling the workflow you get an updated image with the latest virus definitions
    - cron: '0 10 * * 1'  # Run Every Monday at 10:00 UTC
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.png'
      - '**.md'
      - '**.sh'
      - '**dependabot.yml'

    
permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

concurrency: deploy

jobs:
  deploy-stage:
    name: deploy (stage-us-east)
    runs-on: ${{ format('codebuild-java-cdk-serverless-clamscan-stage-us-east-runner-{0}-{1}', github.run_id, github.run_attempt) }}
    environment: stage-us-east

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    
    # Use AWS Java to build
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: maven

    - name: Set up Node 20
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    
    - name: Install the latest AWS CDK
      run: |
        npm install -g aws-cdk
        echo "Node Version: $(node -v)"
        echo "CDK Version: $(cdk version)"
    
    - name: Setup AWS Credentials
      id: aws-creds
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
        # The full role ARN if you are using OIDC
        # https://github.com/aws-actions/configure-aws-credentials#oidc
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        # Set up the below secrets if you are not using OIDC and want to use regular keys (best practive is to use just role above with OIDC provider)
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        mask-aws-account-id: true
    
    - name: Debug OIDC Token
      if: ${{ vars.DEBUG_OIDC == 'true' }} # Set DEBUG_OIDC=true as a GitHub Actions variable to enable this step
      shell: bash
      run: |
        echo "Fetching OIDC token..."
        token=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL")
        echo "$token" | cut -d '.' -f2 | base64 -d | jq
    
    - name: Add AWS_ACCOUNT_ID to Environment
      run: echo "AWS_ACCOUNT_ID=${{ steps.aws-creds.outputs.aws-account-id }}" >> $GITHUB_ENV
    
    - name: Build top level project which will have lambda jar ready for CDK build
      run: > 
        mvn install -DskipTests
        --no-transfer-progress --quiet
        
    - name: Construct bucketNames Context adding Validation Bucket for test if defined
      id: construct-buckets
      run: |
        BUCKETS="${{ vars.S3_BUCKET_NAMES }}"
        if [ -n "${{ vars.VALIDATION_BUCKET }}" ]; then
          BUCKETS="${BUCKETS},${{ vars.VALIDATION_BUCKET }}"
        fi
        echo "BUCKET_NAMES=$BUCKETS" >> $GITHUB_ENV
        echo "Final list of bucket names to deploy against: $BUCKETS"
  
    - name: Ensure CDK is bootstraped and up to date
      working-directory: ./cdk
      run: cdk bootstrap --ci=true aws://${AWS_ACCOUNT_ID}/${{ vars.AWS_REGION || 'us-east-1' }}
    
    - name: Deploy CDK Stack
      working-directory: ./cdk
      env:
        ONLY_TAG_INFECTED: ${{ vars.ONLY_TAG_INFECTED }}
        VALIDATION_BUCKET: ${{ vars.VALIDATION_BUCKET }}
      run: > 
        cdk deploy --require-approval=never --ci=true 
        --context bucketNames="${{ env.BUCKET_NAMES }}"
        --context addBucketPolicy="${{ vars.ADD_BUCKET_POLICY || 'false' }}"
      
    - name: Run Virus Scan Integration Tests (if VALIDATION_BUCKET is set)
      if: ${{ vars.VALIDATION_BUCKET != '' }}
      id: scan-tests
      working-directory: ./integration-test
      env:
        VALIDATION_BUCKET: ${{ vars.VALIDATION_BUCKET }}
        ONLY_TAG_INFECTED: ${{ vars.ONLY_TAG_INFECTED }}
      run: |
        echo "Waiting 30 seconds to allow Lambda to finish deploying..."
        sleep 30
        echo "Running Virus Scan Validation Tests..."
        mvn --batch-mode --no-transfer-progress exec:java

    - name: Capture Tested Image URI For Promotion
      id: capture_image
      working-directory: ./cdk
      run: |
        FUNCTION_NAME=$(aws cloudformation describe-stacks \
          --stack-name ClamavLambdaStack \
          --query "Stacks[0].Outputs[?OutputKey=='ClamavLambdaStackLambdaName'].OutputValue" \
          --output text)

        RESOLVED_IMAGE_URI=$(aws lambda get-function \
          --function-name "$FUNCTION_NAME" \
          --query 'Code.ResolvedImageUri' \
          --output text)

        printf '%s' "$RESOLVED_IMAGE_URI" > "$RUNNER_TEMP/resolved-image-uri.txt"

    - name: Upload Tested Image URI
      uses: actions/upload-artifact@v7
      with:
        name: tested-image-uri
        path: ${{ runner.temp }}/resolved-image-uri.txt
        if-no-files-found: error
        
    - name: Rollback Lambda Alias if Tests Fail
      if: failure() && steps.scan-tests.outcome == 'failure'
      run: |
        echo "Rolling back Lambda alias to previous version..."

        FUNCTION_NAME=$(cd shared-model; mvn --quiet exec:java -Dexec.args=LAMBDA_NAME)
        ALIAS_NAME=$(cd shared-model; mvn --quiet exec:java -Dexec.args=LAMBDA_ALIAS_NAME)

        # Get previous version (second to last version)
        PREV_VERSION=$(aws lambda list-versions-by-function \
            --function-name "$FUNCTION_NAME" \
            --query 'Versions[-2].Version' \
            --output text)

        echo "Repointing alias $ALIAS_NAME to version $PREV_VERSION"

        aws lambda update-alias \
            --function-name "$FUNCTION_NAME" \
            --name "$ALIAS_NAME" \
            --function-version "$PREV_VERSION"

  deploy-prod:
    name: deploy (prod-us-east)
    needs: deploy-stage
    runs-on: ubuntu-latest
    environment: prod-us-east

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: maven

    - name: Set up Node 20
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Install the latest AWS CDK
      run: |
        npm install -g aws-cdk
        echo "Node Version: $(node -v)"
        echo "CDK Version: $(cdk version)"

    - name: Setup AWS Credentials
      id: aws-creds
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        mask-aws-account-id: true

    - name: Add AWS_ACCOUNT_ID to Environment
      run: echo "AWS_ACCOUNT_ID=${{ steps.aws-creds.outputs.aws-account-id }}" >> $GITHUB_ENV

    - name: Build CDK project without rebuilding the Lambda image
      run: >
        mvn -pl shared-model,cdk -am install -DskipTests
        --no-transfer-progress --quiet

    - name: Construct bucketNames Context
      run: |
        echo "BUCKET_NAMES=${{ vars.S3_BUCKET_NAMES }}" >> $GITHUB_ENV
        echo "Final list of bucket names to deploy against: ${{ vars.S3_BUCKET_NAMES }}"

    - name: Download Tested Image URI
      uses: actions/download-artifact@v8
      with:
        name: tested-image-uri
        path: ${{ runner.temp }}/tested-image-uri

    - name: Ensure CDK is bootstraped and up to date
      working-directory: ./cdk
      run: cdk bootstrap --ci=true aws://${AWS_ACCOUNT_ID}/${{ vars.AWS_REGION || 'us-east-1' }}

    - name: Promote Tested Image Into Production ECR
      run: |
        SOURCE_IMAGE_URI="$(cat "$RUNNER_TEMP/tested-image-uri/resolved-image-uri.txt")"
        if [ -z "$SOURCE_IMAGE_URI" ]; then
          echo "Stage job did not provide a resolved image URI for promotion." >&2
          exit 1
        fi

        SOURCE_REGISTRY="${SOURCE_IMAGE_URI%%/*}"
        TARGET_REPOSITORY_NAME="cdk-hnb659fds-container-assets-${AWS_ACCOUNT_ID}-${{ vars.AWS_REGION || 'us-east-1' }}"
        PROMOTED_IMAGE_TAG="promoted-${GITHUB_SHA}"
        TARGET_IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com/${TARGET_REPOSITORY_NAME}:${PROMOTED_IMAGE_TAG}"

        aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | \
          docker login --username AWS --password-stdin "$SOURCE_REGISTRY"

        aws ecr get-login-password --region "${{ vars.AWS_REGION || 'us-east-1' }}" | \
          docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com"

        docker pull "$SOURCE_IMAGE_URI"
        docker tag "$SOURCE_IMAGE_URI" "$TARGET_IMAGE_URI"
        docker push "$TARGET_IMAGE_URI"

        PROMOTED_IMAGE_DIGEST=$(aws ecr describe-images \
          --repository-name "$TARGET_REPOSITORY_NAME" \
          --image-ids imageTag="$PROMOTED_IMAGE_TAG" \
          --query 'imageDetails[0].imageDigest' \
          --output text)

        echo "PROMOTED_IMAGE_REPOSITORY_NAME=$TARGET_REPOSITORY_NAME" >> $GITHUB_ENV
        echo "PROMOTED_IMAGE_DIGEST=$PROMOTED_IMAGE_DIGEST" >> $GITHUB_ENV

    - name: Deploy CDK Stack Using Promoted Image
      working-directory: ./cdk
      env:
        ONLY_TAG_INFECTED: ${{ vars.ONLY_TAG_INFECTED }}
        VALIDATION_BUCKET: ${{ vars.VALIDATION_BUCKET }}
      run: >
        cdk deploy --require-approval=never --ci=true
        --context bucketNames="${{ env.BUCKET_NAMES }}"
        --context addBucketPolicy="${{ vars.ADD_BUCKET_POLICY || 'false' }}"
        --context imageRepositoryName="${{ env.PROMOTED_IMAGE_REPOSITORY_NAME }}"
        --context imageTagOrDigest="${{ env.PROMOTED_IMAGE_DIGEST }}"
